<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Feed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        header {
            background: #222;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #1b1b1b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        input, button, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        input, textarea {
            background: #333;
            color: #f5f5f5;
        }

        button {
            background: #ff0044;
            color: white;
            cursor: pointer;
        }

        button.secondary {
            background: #444;
        }

        .hidden {
            display: none;
        }

        .feed-item {
            margin-bottom: 20px;
        }

        .feed-item img {
            width: 100%;
            border-radius: 10px;
            margin-top: 8px;
        }

        .username {
            font-weight: bold;
            color: #ff6699;
        }

        .caption {
            margin-top: 4px;
            font-size: 14px;
            color: #ddd;
        }

        .comment-box {
            margin-top: 10px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
        }

        .comment {
            margin-top: 6px;
            padding: 6px;
            background: #333;
            border-radius: 6px;
        }

        .footer {
            text-align: center;
            padding: 10px;
            color: #777;
            font-size: 13px;
        }
