<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Feed</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        header {
            background: #222;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #1b1b1b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        input, button, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        input, textarea {
            background: #333;
            color: #f5f5f5;
        }

        button {
            background: #ff0044;
            color: white;
            cursor: pointer;
        }

        button.secondary {
            background: #444;
        }

        .hidden {
            display: none;
        }

        .feed-item {
            margin-bottom: 20px;
        }

        .feed-item img {
            width: 100%;
            border-radius: 10px;
            margin-top: 8px;
        }

        .username {
            font-weight: bold;
            color: #ff6699;
        }

        .caption {
            margin-top: 4px;
            font-size: 14px;
            color: #ddd;
        }

        .comment-box {
            margin-top: 10px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
        }

        .comment {
            margin-top: 6px;
            padding: 6px;
            background: #333;
            border-radius: 6px;
        }

        .footer {
            text-align: center;
            padding: 10px;
            color: #777;
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>AI Photo Feed</header>

<div class="container">

    <!-- AUTH -->
    <div id="auth-card" class="card">
        <h3 id="auth-title">Create an account</h3>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button onclick="handleAuth()">Sign up</button>
        <button class="secondary" onclick="toggleAuthMode()">Already have an account? Log in</button>
    </div>

    <!-- USER INFO -->
    <div id="user-info" class="card hidden">
        <p>Logged in as <span id="current-user"></span></p>
        <button class="secondary" onclick="logout()">Log out</button>
    </div>

    <!-- POST -->
    <div id="post-card" class="card hidden">
        <h3>Post an AI-generated photo</h3>
        <input id="caption" placeholder="Caption">
        <input id="image-input" type="file" accept="image/*">
        <button onclick="createPost()">Post photo</button>
    </div>

    <!-- FEED -->
    <div id="feed-card" class="card">
        <h3>Latest AI photos</h3>
        <div id="feed"></div>
    </div>

</div>

<div class="footer">
    Prototype app – accounts, posts & comments stored locally.
</div>

<script>
    let authMode = "signup";

    function getUsers() {
        return JSON.parse(localStorage.getItem("ai_users") || "{}");
    }

    function saveUsers(users) {
        localStorage.setItem("ai_users", JSON.stringify(users));
    }

    function getPosts() {
        return JSON.parse(localStorage.getItem("ai_posts") || "[]");
    }

    function savePosts(posts) {
        localStorage.setItem("ai_posts", JSON.stringify(posts));
    }

    function getCurrentUser() {
        return localStorage.getItem("ai_current_user");
    }

    function setCurrentUser(username) {
        if (username) {
            localStorage.setItem("ai_current_user", username);
        } else {
            localStorage.removeItem("ai_current_user");
        }
        updateUI();
    }

    function toggleAuthMode() {
        authMode = authMode === "signup" ? "login" : "signup";
        document.getElementById("auth-title").innerText =
            authMode === "signup" ? "Create an account" : "Log in";
        document.querySelector("#auth-card button").innerText =
            authMode === "signup" ? "Sign up" : "Log in";
        document.querySelector("#auth-card .secondary").innerText =
            authMode === "signup" ? "Already have an account? Log in" : "Need an account? Sign up";
    }

    function handleAuth() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!username || !password) {
            alert("Enter username and password.");
            return;
        }

        const users = getUsers();

        if (authMode === "signup") {
            if (users[username]) {
                alert("Username already exists.");
                return;
            }
            users[username] = { password };
            saveUsers(users);
            setCurrentUser(username);
        } else {
            if (!users[username] || users[username].password !== password) {
                alert("Invalid login.");
                return;
            }
            setCurrentUser(username);
        }
    }

    function logout() {
        setCurrentUser(null);
    }

    function createPost() {
        const user = getCurrentUser();
        if (!user) return alert("Log in first.");

        const caption = document.getElementById("caption").value.trim();
        const file = document.getElementById("image-input").files[0];

        if (!file) return alert("Select an image.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const posts = getPosts();
            posts.unshift({
                username: user,
                caption: caption || "AI-generated photo",
                imageData: e.target.result,
                comments: []
            });
            savePosts(posts);
            document.getElementById("caption").value = "";
            document.getElementById("image-input").value = "";
            renderFeed();
        };
        reader.readAsDataURL(file);
    }

    function addComment(index) {
        const user = getCurrentUser();
        if (!user) return alert("Log in to comment.");

        const input = document.getElementById("comment-" + index);
        const text = input.value.trim();
        if (!text) return;

        const posts = getPosts();
        posts[index].comments.push({ username: user, text });
        savePosts(posts);

        input.value = "";
        renderFeed();
    }

    function renderFeed() {
        const feed = document.getElementById("feed");
        const posts = getPosts();

        if (posts.length === 0) {
            feed.innerHTML = "<p>No posts yet.</p>";
            return;
        }

        feed.innerHTML = "";
        posts.forEach((post, index) => {
            const div = document.createElement("div");
            div.className = "feed-item";

            div.innerHTML = `
                <div class="username">@${post.username}</div>
                <div class="caption">${post.caption}</div>
                <img src="${post.imageData}">
                <div class="comment-box">
                    <h4>Comments</h4>
                    ${post.comments.map(c => `
                        <div class="comment"><b>@${c.username}</b>: ${c.text}</div>
                    `).join("")}
                    <textarea id="comment-${index}" placeholder="Write a comment..."></textarea>
                    <button onclick="addComment(${index})">Post Comment</button>
                </div>
            `;

            feed.appendChild(div);
        });
    }

    function updateUI() {
        const user = getCurrentUser();

        document.getElementById("auth-card").classList.toggle("hidden", !!user);
        document.getElementById("user-info").classList.toggle("hidden", !user);
        document.getElementById("post-card").classList.toggle("hidden", !user);

        document.getElementById("current-user").innerText = user || "";

        renderFeed();
    }

    updateUI();
</script>

</body>
</html>
