<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Feed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        header {
            background: #222;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #1b1b1b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        input {
            background: #333;
            color: #f5f5f5;
        }

        button {
            background: #ff0044;
            color: white;
            cursor: pointer;
        }

        button.secondary {
            background: #444;
        }

        .hidden {
            display: none;
        }

        .feed-item {
            margin-bottom: 15px;
        }

        .feed-item img {
            width: 100%;
            border-radius: 10px;
            margin-top: 8px;
        }

        .username {
            font-weight: bold;
            color: #ff6699;
        }

        .caption {
            margin-top: 4px;
            font-size: 14px;
            color: #ddd;
        }

        .footer {
            text-align: center;
            padding: 10px;
            color: #777;
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    AI Photo Feed
</header>

<div class="container">

    <!-- AUTH SECTION -->
    <div id="auth-card" class="card">
        <h3 id="auth-title">Create an account</h3>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button onclick="handleAuth()">Sign up</button>
        <button class="secondary" onclick="toggleAuthMode()">Already have an account? Log in</button>
    </div>

    <!-- LOGGED-IN INFO -->
    <div id="user-info" class="card hidden">
        <p>Logged in as <span id="current-user"></span></p>
        <button class="secondary" onclick="logout()">Log out</button>
    </div>

    <!-- POST SECTION -->
    <div id="post-card" class="card hidden">
        <h3>Post an AI-generated photo</h3>
        <input id="caption" placeholder="Caption (e.g. 'AI cat in space')">
        <input id="image-input" type="file" accept="image/*">
        <button onclick="createPost()">Post photo</button>
    </div>

    <!-- FEED -->
    <div id="feed-card" class="card">
        <h3>Latest AI photos</h3>
        <div id="feed"></div>
    </div>

</div>

<div class="footer">
    Prototype app – accounts & posts stored locally in this browser only.
</div>

<script>
    let authMode = "signup"; // "signup" or "login"

    function getUsers() {
        return JSON.parse(localStorage.getItem("ai_users") || "{}");
    }

    function saveUsers(users) {
        localStorage.setItem("ai_users", JSON.stringify(users));
    }

    function getPosts() {
        return JSON.parse(localStorage.getItem("ai_posts") || "[]");
    }

    function savePosts(posts) {
        localStorage.setItem("ai_posts", JSON.stringify(posts));
    }

    function getCurrentUser() {
        return localStorage.getItem("ai_current_user");
    }

    function setCurrentUser(username) {
        if (username) {
            localStorage.setItem("ai_current_user", username);
        } else {
            localStorage.removeItem("ai_current_user");
        }
        updateUI();
    }

    function toggleAuthMode() {
        authMode = authMode === "signup" ? "login" : "signup";
        document.getElementById("auth-title").innerText =
            authMode === "signup" ? "Create an account" : "Log in";
        document.querySelector("#auth-card button").innerText =
            authMode === "signup" ? "Sign up" : "Log in";
        document.querySelector("#auth-card .secondary").innerText =
            authMode === "signup" ? "Already have an account? Log in" : "Need an account? Sign up";
    }

    function handleAuth() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!username || !password) {
            alert("Please enter a username and password.");
            return;
        }

        const users = getUsers();

        if (authMode === "signup") {
            if (users[username]) {
                alert("Username already exists. Try logging in.");
                return;
            }
            users[username] = { password };
            saveUsers(users);
            setCurrentUser(username);
            alert("Account created and logged in!");
        } else {
            if (!users[username] || users[username].password !== password) {
                alert("Invalid username or password.");
                return;
            }
            setCurrentUser(username);
            alert("Logged in!");
        }
    }

    function logout() {
        setCurrentUser(null);
    }

    function createPost() {
        const user = getCurrentUser();
        if (!user) {
            alert("You must be logged in to post.");
            return;
        }

        const caption = document.getElementById("caption").value.trim();
        const fileInput = document.getElementById("image-input");
        const file = fileInput.files[0];

        if (!file) {
            alert("Please select an image.");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const posts = getPosts();
            posts.unshift({
                username: user,
                caption: caption || "AI-generated photo",
                imageData: e.target.result,
                createdAt: new Date().toISOString()
            });
            savePosts(posts);
            document.getElementById("caption").value = "";
            fileInput.value = "";
            renderFeed();
        };
        reader.readAsDataURL(file);
    }

    function renderFeed() {
        const feedEl = document.getElementById("feed");
        const posts = getPosts();

        if (posts.length === 0) {
            feedEl.innerHTML = "<p>No photos yet. Be the first to post!</p>";
            return;
        }

        feedEl.innerHTML = "";
        posts.forEach(post => {
            const div = document.createElement("div");
            div.className = "feed-item";
            div.innerHTML = `
                <div class="username">@${post.username}</div>
                <div class="caption">${post.caption}</div>
                <img src="${post.imageData}" alt="AI generated photo">
            `;
            feedEl.appendChild(div);
        });
    }

    function updateUI() {
        const user = getCurrentUser();
        const authCard = document.getElementById("auth-card");
        const userInfo = document.getElementById("user-info");
        const postCard = document.getElementById("post-card");
        const currentUserSpan = document.getElementById("current-user");

        if (user) {
            authCard.classList.add("hidden");
            userInfo.classList.remove("hidden");
            postCard.classList.remove("hidden");
            currentUserSpan.innerText = user;
        } else {
            authCard.classList.remove("hidden");
            userInfo.classList.add("hidden");
            postCard.classList.add("hidden");
            currentUserSpan.innerText = "";
        }

        renderFeed();
    }

    // Init
    updateUI();
</script>

</body>
</html>
